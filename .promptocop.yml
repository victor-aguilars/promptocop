# Set to false to disable promptocop without removing the hook
enabled: true

# Set to true to suppress per-violation details from hook stderr output
# silent: true

extends:
  - promptocop:recommended

rules:
  no-vague-verb: error
  no-ambiguous-pronoun: error
  missing-success-criteria: error
  no-file-context: warn
  no-constraints: warn
  multi-task: error
  context-dump-risk: warn
  prefer-example: info

# options:
#   no-vague-verb:
#     additionalVerbs:
#       - "touch"
#       - "revisit"

# context:
#   mode: directive   # "directive" (default, actionable instructions for Claude) or "compact" (raw violation labels)
